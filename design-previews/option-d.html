<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>方案D - 学院简洁</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; padding: 40px; }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 260px);
    gap: 20px;
    max-width: 860px;
    margin: 0 auto;
  }
  
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    position: relative;
    transition: all 0.3s;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  }
  
  .lesson-num {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 2.5rem;
    font-weight: 800;
    color: #f0f0f0;
    line-height: 1;
  }
  
  .difficulty {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .difficulty.basic { background: #e8f5e9; color: #2e7d32; }
  .difficulty.intermediate { background: #e3f2fd; color: #1565c0; }
  .difficulty.advanced { background: #fff3e0; color: #e65100; }
  .difficulty.expert { background: #fce4ec; color: #c62828; }
  .difficulty.project { background: #fff8e1; color: #f57f17; }
  
  .lesson-title { font-size: 1.15rem; margin-bottom: 8px; color: #1a1a2e; font-weight: 700; }
  .lesson-desc { font-size: 0.82rem; color: #666; margin-bottom: 16px; line-height: 1.5; }
  
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag { 
    padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; 
    background: #f5f5f5; color: #888;
  }
  
  .link { 
    color: #1565c0; font-size: 0.85rem; text-decoration: none; 
    font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .link:hover { color: #0d47a1; }
  .link:hover { gap: 8px; }
  
  h1 { text-align: center; color: #1a1a2e; font-size: 2rem; margin-bottom: 40px; font-weight: 700; }
  h1 span { color: #1565c0; }
</style>
</head>
<body>
  <h1>🎓 <span>ThreeBodyPlay</span> - 学院简洁风格</h1>
  <div class="grid">
    <div class="card">
      <div class="lesson-num">01</div>
      <span class="difficulty basic">Basic</span>
      <h3 class="lesson-title">Basic Scene</h3>
      <p class="lesson-desc">创建你的第一个 Three.js 场景</p>
      <div class="tags">
        <span class="tag">Getting Started</span>
      </div>
      <a class="link" href="#">开始学习 →</a>
    </div>
    <div class="card">
      <div class="lesson-num">05</div>
      <span class="difficulty intermediate">Intermediate</span>
      <h3 class="lesson-title">Animation</h3>
      <p class="lesson-desc">学习动画基础知识</p>
      <div class="tags">
        <span class="tag">Animation</span>
      </div>
      <a class="link" href="#">开始学习 →</a>
    </div>
    <div class="card">
      <div class="lesson-num">13</div>
      <span class="difficulty expert">Expert</span>
      <h3 class="lesson-title">Shaders</h3>
      <p class="lesson-desc">自定义着色器编程</p>
      <div class="tags">
        <span class="tag">Shaders</span>
      </div>
      <a class="link" href="#">开始学习 →</a>
    </div>
    <div class="card">
      <div class="lesson-num">18</div>
      <span class="difficulty project">Project</span>
      <h3 class="lesson-title">Final Project</h3>
      <p class="lesson-desc">构建一个完整的 3D 应用</p>
      <div class="tags">
        <span class="tag">Final</span>
      </div>
      <a class="link" href="#">开始学习 →</a>
    </div>
  </div>
</body>
</html>
